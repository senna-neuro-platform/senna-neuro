simulation:
  dt: 0.5
  seed: 42

lattice:
  width: 28
  height: 28
  depth: 20
  density: 0.7
  neighbor_radius: 2.0
  num_outputs: 10
  excitatory_ratio: 0.8

lif:
  V_rest: 0.0
  V_reset: 0.0
  tau_m: 20.0
  t_ref: 2.0
  theta_base: 1.0

synapse:
  w_min: 0.01
  w_max: 0.1
  c_base: 1.0
  w_wta: -5.0

stdp:
  A_plus: 0.01
  A_minus: 0.012
  tau_plus: 20.0
  tau_minus: 20.0
  w_max: 1.0

homeostasis:
  alpha: 0.999
  target_rate: 5.0   # Hz
  theta_step: 0.001  # delta theta per Hz error
  theta_min: 0.1
  theta_max: 5.0
  interval_ticks: 10
  global_mix: 0.5    # share of global activity in blend [0,1]

encoder:
  max_rate: 100.0
  presentation_ms: 50.0
  input_value: 1.5

decoder:
  window_ms: 50.0
  seed: 42

observability:
  tick_duration_buckets: [0.0005, 0.001, 0.002, 0.005, 0.01, 0.02, 0.05, 0.1]
  exporter_backlog: 8

structural:
  w_min_prune: 0.001
  interval_ticks: 10000
  sprout_radius: 2.0
  sprout_weight: 0.01
  quiet_fraction: 0.5

ports:
  grpc: 50051
  ws: 8080
  metrics: 9090

trainer:
  host: senna-core
  port: 50051

loop:
  sleep_ms: 1
