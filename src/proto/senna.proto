syntax = "proto3";

package senna;

option cc_enable_arenas = true;

import "google/protobuf/empty.proto";

// Core gRPC surface for SENNA spike network.
service SennaCore {
  // Enqueue a sensory stimulus (typically a 28x28 image encoded as pixels).
  rpc InjectStimulus(StimulusRequest) returns (StimulusResponse);

  // Retrieve prediction for a previously injected stimulus.
  rpc GetPrediction(PredictionRequest) returns (PredictionResponse);

  // Force supervision signal for a given stimulus (teacher forcing).
  rpc Supervise(SupervisionRequest) returns (SupervisionResponse);

  // Report current core status/metrics.
  rpc GetStatus(google.protobuf.Empty) returns (StatusResponse);

  // Apply runtime hyperparameter overrides.
  rpc Configure(ConfigRequest) returns (ConfigResponse);

  // Server stream of predictions as they become available.
  rpc StreamPredictions(google.protobuf.Empty) returns (stream PredictionEvent);

  // Trainer reports aggregate accuracy (fed to metrics/exporter).
  rpc ReportAccuracy(AccuracyRequest) returns (google.protobuf.Empty);

  // Graceful shutdown of core.
  rpc Shutdown(google.protobuf.Empty) returns (google.protobuf.Empty);
}

// === Stimulus / prediction pipeline ===

message StimulusRequest {
  // Flattened pixels (0..255) row-major; expected length 28*28 but not enforced.
  repeated uint32 pixels = 1;
  // Optional label for downstream logging/supervision.
  int32 label = 2;
  // Duration of presentation window in milliseconds.
  uint32 duration_ms = 3;
  // Optional user-provided correlation id.
  string client_id = 4;
}

message StimulusResponse {
  bool accepted = 1;
  uint64 stimulus_id = 2;
  string error = 3;
}

message PredictionRequest {
  uint64 stimulus_id = 1;
}

message PredictionResponse {
  uint64 stimulus_id = 1;
  int32 predicted_class = 2;
  // Confidence proxy: lower time of first spike = higher confidence.
  double confidence = 3;
  // Latency from stimulus injection to first spike, milliseconds.
  uint32 latency_ms = 4;
  bool ready = 5;
}

message PredictionEvent {
  uint64 stimulus_id = 1;
  int32 predicted_class = 2;
  double confidence = 3;
  uint32 latency_ms = 4;
}

// === Supervision ===

message SupervisionRequest {
  uint64 stimulus_id = 1;
  int32 correct_class = 2;
}

message SupervisionResponse {
  bool accepted = 1;
  string error = 2;
}

// === Status / configuration ===

message StatusResponse {
  double phase = 1;
  double sleep_pressure = 2;
  uint64 virtual_time_ms = 3;
  uint32 neuron_count = 4;
  uint64 synapse_count = 5;
}

// Generic key/value overrides to avoid frequent proto churn.
message ConfigRequest {
  map<string, double> scalars = 1;
}

message ConfigResponse {
  bool applied = 1;
  string error = 2;
}

// === Accuracy reporting ===

message AccuracyRequest {
  double train_accuracy = 1;
  double test_accuracy = 2;
}
