<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SENNA Visualizer</title>
    <style>
      :root {
        --bg-top: #02060d;
        --bg-bottom: #12304c;
        --panel-bg: rgba(4, 10, 18, 0.84);
        --panel-border: rgba(120, 220, 255, 0.42);
        --accent: #6ef2ff;
        --accent-warm: #ffca52;
        --text: #f3fbff;
        --muted: #b8d0df;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background:
          radial-gradient(circle at 18% 12%, rgba(110, 242, 255, 0.18), transparent 34%),
          radial-gradient(circle at 84% 82%, rgba(255, 202, 82, 0.16), transparent 36%),
          linear-gradient(172deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
        font-family: "Futura", "Trebuchet MS", "Gill Sans", sans-serif;
        letter-spacing: 0.02em;
      }

      #scene {
        width: 100%;
        height: 100%;
        display: block;
      }

      .panel {
        position: fixed;
        top: 14px;
        left: 14px;
        width: min(360px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        overflow: auto;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 14px 14px 12px;
        box-sizing: border-box;
        backdrop-filter: blur(8px);
      }

      .title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .title h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .title .sub {
        color: var(--muted);
        font-size: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 8px;
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: linear-gradient(160deg, rgba(73, 210, 194, 0.22), rgba(73, 210, 194, 0.08));
        color: var(--text);
        border-radius: 9px;
        padding: 8px 10px;
        cursor: pointer;
        transition: transform 0.16s ease, border-color 0.16s ease;
      }

      button:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .toggle-warm {
        background: linear-gradient(160deg, rgba(255, 177, 92, 0.24), rgba(255, 177, 92, 0.08));
      }

      .control {
        margin-bottom: 10px;
      }

      .label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .checks {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        font-size: 12px;
      }

      .checks label {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .status {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 12px;
      }

      .status-line {
        display: flex;
        justify-content: space-between;
        margin-bottom: 3px;
      }

      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .ok {
        color: #b8ffd8;
        border-color: rgba(184, 255, 216, 0.35);
      }

      .bad {
        color: #ffd0d0;
        border-color: rgba(255, 208, 208, 0.35);
      }

      @media (max-width: 780px) {
        .panel {
          top: auto;
          bottom: 10px;
          left: 10px;
          right: 10px;
          width: auto;
          max-height: 48vh;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <aside class="panel">
      <div class="title">
        <h1>SENNA Wave Visualizer</h1>
        <span class="sub">Three.js + WebSocket</span>
      </div>

      <div class="row">
        <button id="togglePlay">Pause</button>
        <button id="stepTick">Next Tick</button>
      </div>

      <div class="row">
        <button id="heatMode" class="toggle-warm">Heatmap: Off</button>
        <button id="clearQueue">Drop Queue</button>
      </div>

      <div class="control">
        <div class="label">
          <span>Playback speed</span>
          <span id="speedValue">1.00x</span>
        </div>
        <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1" />
      </div>

      <div class="control">
        <div class="label">
          <span>Z slice</span>
          <span id="zSliceValue">All layers</span>
        </div>
        <input id="zSlice" type="range" min="-1" max="0" step="1" value="-1" />
      </div>

      <div class="control">
        <div class="label">
          <span>Neuron type filters</span>
          <span id="visibleCount">0 visible</span>
        </div>
        <div class="checks">
          <label><input id="showExcitatory" type="checkbox" checked />Excitatory</label>
          <label><input id="showInhibitory" type="checkbox" checked />Inhibitory</label>
          <label><input id="showOutput" type="checkbox" checked />Output</label>
        </div>
      </div>

      <div class="status">
        <div class="status-line">
          <span>Connection</span>
          <span id="connState" class="pill bad">offline</span>
        </div>
        <div class="status-line">
          <span>Tick</span>
          <span id="tickValue">0</span>
        </div>
        <div class="status-line">
          <span>Active this frame</span>
          <span id="activeValue">0</span>
        </div>
        <div class="status-line">
          <span>Active ratio</span>
          <span id="ratioValue">0.00%</span>
        </div>
        <div class="status-line">
          <span>Buffered frames</span>
          <span id="queueValue">0</span>
        </div>
        <div class="status-line">
          <span>Trace</span>
          <span id="traceValue">waiting</span>
        </div>
        <div class="status-line">
          <span>Label / Pred</span>
          <span id="classValue">- / -</span>
        </div>
      </div>
    </aside>

    <script type="module">
      import * as THREE from "./vendor/three.module.js";
      import { OrbitControls } from "./vendor/OrbitControls.js";

      const canvas = document.getElementById("scene");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#04080f");
      scene.fog = new THREE.FogExp2("#07111d", 0.0075);

      const camera = new THREE.PerspectiveCamera(57, window.innerWidth / window.innerHeight, 0.1, 280);
      camera.position.set(28, 25, 36);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.target.set(0, 0, 0);
      controls.maxDistance = 120;

      scene.add(new THREE.AmbientLight(0xd9f5ff, 0.34));
      const hemiLight = new THREE.HemisphereLight(0x91ecff, 0x050b14, 0.55);
      scene.add(hemiLight);
      const keyLight = new THREE.DirectionalLight(0xe8fbff, 1.52);
      keyLight.position.set(22, 26, 15);
      scene.add(keyLight);
      const rimLight = new THREE.DirectionalLight(0xffc95d, 1.05);
      rimLight.position.set(-18, 14, -20);
      scene.add(rimLight);
      const fillLight = new THREE.DirectionalLight(0x56d8ff, 0.72);
      fillLight.position.set(-8, 12, 20);
      scene.add(fillLight);
      const backLight = new THREE.DirectionalLight(0x3dd4ff, 0.48);
      backLight.position.set(0, -10, -24);
      scene.add(backLight);

      const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
      const wsUrl = `${wsProtocol}://${window.location.host}/ws`;

      const ui = {
        togglePlay: document.getElementById("togglePlay"),
        stepTick: document.getElementById("stepTick"),
        heatMode: document.getElementById("heatMode"),
        clearQueue: document.getElementById("clearQueue"),
        speed: document.getElementById("speed"),
        speedValue: document.getElementById("speedValue"),
        zSlice: document.getElementById("zSlice"),
        zSliceValue: document.getElementById("zSliceValue"),
        showExcitatory: document.getElementById("showExcitatory"),
        showInhibitory: document.getElementById("showInhibitory"),
        showOutput: document.getElementById("showOutput"),
        visibleCount: document.getElementById("visibleCount"),
        connState: document.getElementById("connState"),
        tickValue: document.getElementById("tickValue"),
        activeValue: document.getElementById("activeValue"),
        ratioValue: document.getElementById("ratioValue"),
        queueValue: document.getElementById("queueValue"),
        traceValue: document.getElementById("traceValue"),
        classValue: document.getElementById("classValue"),
      };

      const state = {
        paused: false,
        heatmap: false,
        connected: false,
        speed: 1,
        zSlice: -1,
        frameQueue: [],
        traceFrames: [],
        fallbackCursor: 0,
        traceVersion: "",
        tracePollHandle: 0,
        traceRefreshPending: false,
        lattice: null,
        mesh: null,
        glowMesh: null,
        idToIndex: new Map(),
        positions: [],
        visible: [],
        baseColors: [],
        flash: [],
        heat: [],
      };

      const tempColor = new THREE.Color();
      const tempMatrix = new THREE.Matrix4();
      const tempQuat = new THREE.Quaternion();
      const tempScale = new THREE.Vector3();

      function setConnectionState(connected) {
        state.connected = connected;

        if (connected) {
          ui.connState.textContent = "online";
          ui.connState.classList.add("ok");
          ui.connState.classList.remove("bad");
          return;
        }

        const hasFallback = state.traceFrames.length > 0;
        ui.connState.textContent = hasFallback ? "fallback" : "offline";
        ui.connState.classList.toggle("ok", false);
        ui.connState.classList.toggle("bad", true);
      }

      function setWaitingState(message) {
        state.connected = false;
        ui.connState.textContent = message;
        ui.connState.classList.remove("ok");
        ui.connState.classList.add("bad");
      }

      function updateTraceMeta(payload) {
        if (!payload || payload.traceReady !== true) {
          ui.traceValue.textContent = "waiting";
          ui.classValue.textContent = "- / -";
          return;
        }

        const epochText = Number.isInteger(payload.epoch) ? `epoch ${payload.epoch}` : "trace";
        ui.traceValue.textContent = epochText;
        const label = Number.isInteger(payload.label) ? payload.label : "-";
        const prediction = Number.isInteger(payload.prediction) ? payload.prediction : "-";
        ui.classValue.textContent = `${label} / ${prediction}`;
      }

      function applyTraceSnapshot(payload, replaceQueue = true) {
        if (!payload || !Array.isArray(payload.frames) || !payload.lattice) {
          return false;
        }

        updateTraceMeta({
          traceReady: true,
          epoch: payload.epoch,
          label: payload.label,
          prediction: payload.prediction,
        });

        state.traceFrames = payload.frames.slice();
        state.fallbackCursor = 0;
        state.traceVersion = typeof payload.version === "string" ? payload.version : "";
        if (replaceQueue) {
          state.frameQueue = payload.frames.slice();
        }
        setConnectionState(state.connected);
        return true;
      }

      function colorForType(type) {
        if (type === "output") {
          return [1.0, 0.82, 0.12];
        }
        if (type === "inhibitory") {
          return [1.0, 0.24, 0.30];
        }
        return [0.08, 0.88, 1.0];
      }

      function lerp(a, b, t) {
        return a + ((b - a) * t);
      }

      function heatColorForIntensity(h) {
        const stops = [
          { at: 0.0, color: [0.16, 0.29, 0.56] },
          { at: 0.25, color: [0.10, 0.84, 1.0] },
          { at: 0.55, color: [0.46, 1.0, 0.48] },
          { at: 0.8, color: [1.0, 0.92, 0.36] },
          { at: 1.0, color: [1.0, 0.48, 0.20] },
        ];

        for (let i = 1; i < stops.length; i += 1) {
          if (h <= stops[i].at) {
            const left = stops[i - 1];
            const right = stops[i];
            const span = Math.max(0.0001, right.at - left.at);
            const t = (h - left.at) / span;
            return [
              lerp(left.color[0], right.color[0], t),
              lerp(left.color[1], right.color[1], t),
              lerp(left.color[2], right.color[2], t),
            ];
          }
        }

        return stops[stops.length - 1].color;
      }

      function toWorldPosition(neuron, lattice) {
        const cx = (lattice.width - 1) / 2;
        const cy = (lattice.height - 1) / 2;
        const cz = (lattice.depth - 1) / 2;

        return new THREE.Vector3(
          (neuron.x - cx) * 0.82,
          (neuron.z - cz) * 0.92,
          (neuron.y - cy) * 0.82,
        );
      }

      function isVisibleByFilters(neuron) {
        if (state.zSlice >= 0 && neuron.z !== state.zSlice) {
          return false;
        }

        if (neuron.type === "excitatory" && !ui.showExcitatory.checked) {
          return false;
        }
        if (neuron.type === "inhibitory" && !ui.showInhibitory.checked) {
          return false;
        }
        if (neuron.type === "output" && !ui.showOutput.checked) {
          return false;
        }

        return true;
      }

      function updateVisibility() {
        if (!state.mesh || !state.lattice) {
          return;
        }

        let visibleCount = 0;

        for (let i = 0; i < state.lattice.neurons.length; i += 1) {
          const neuron = state.lattice.neurons[i];
          const position = state.positions[i];
          const visible = isVisibleByFilters(neuron);
          state.visible[i] = visible;

          if (visible) {
            visibleCount += 1;
          }

          tempScale.setScalar(visible ? 0.155 : 0.00001);
          tempMatrix.compose(position, tempQuat, tempScale);
          state.mesh.setMatrixAt(i, tempMatrix);
        }

        state.mesh.instanceMatrix.needsUpdate = true;
        ui.visibleCount.textContent = `${visibleCount} visible`;
      }

      function updateInstances() {
        if (!state.mesh || !state.glowMesh || !state.lattice) {
          return;
        }

        const baseScale = 0.115;
        const flashScale = 0.38;
        const heatScale = state.heatmap ? 0.18 : 0.09;
        const hiddenScale = 0.00001;
        const hiddenGlowScale = 0.00001;

        for (let i = 0; i < state.lattice.neurons.length; i += 1) {
          const base = state.baseColors[i];
          let r = base[0];
          let g = base[1];
          let b = base[2];
          let scale = baseScale;
          let glowR = 0.0;
          let glowG = 0.0;
          let glowB = 0.0;
          let glowScale = hiddenGlowScale;

          if (!state.visible[i]) {
            r = 0.0;
            g = 0.0;
            b = 0.0;
            scale = hiddenScale;
          } else if (state.heatmap) {
            const h = state.heat[i];
            const heat = heatColorForIntensity(h);
            r = Math.min(1.0, (base[0] * 0.06) + (heat[0] * (0.9 + (h * 0.1))));
            g = Math.min(1.0, (base[1] * 0.06) + (heat[1] * (0.9 + (h * 0.1))));
            b = Math.min(1.0, (base[2] * 0.06) + (heat[2] * (0.9 + (h * 0.1))));
            scale = baseScale + (h * heatScale) + (state.flash[i] * flashScale);
            const glowStrength = Math.min(1.0, (state.flash[i] * 1.15) + (h * 0.8));
            glowR = Math.min(1.0, ((heat[0] * 0.55) + 0.45) * glowStrength);
            glowG = Math.min(1.0, ((heat[1] * 0.55) + 0.45) * glowStrength);
            glowB = Math.min(1.0, ((heat[2] * 0.55) + 0.45) * glowStrength);
            glowScale = 0.16 + (glowStrength * 0.64);
          } else {
            const s = state.flash[i];
            const h = state.heat[i];
            r = Math.min(1.0, (r * (0.45 + (h * 0.18))) + 0.10 + (0.92 * s));
            g = Math.min(1.0, (g * (0.45 + (h * 0.18))) + 0.10 + (0.92 * s));
            b = Math.min(1.0, (b * (0.45 + (h * 0.16))) + 0.10 + (0.88 * s));
            scale = baseScale + (h * heatScale) + (s * flashScale);
            const glowStrength = Math.min(1.0, (s * 1.2) + (h * 0.65));
            glowR = Math.min(1.0, ((base[0] * 0.35) + 0.65) * glowStrength);
            glowG = Math.min(1.0, ((base[1] * 0.35) + 0.65) * glowStrength);
            glowB = Math.min(1.0, ((base[2] * 0.35) + 0.65) * glowStrength);
            glowScale = 0.14 + (glowStrength * 0.58);
          }

          tempColor.setRGB(r, g, b);
          state.mesh.setColorAt(i, tempColor);
          tempScale.setScalar(scale);
          tempMatrix.compose(state.positions[i], tempQuat, tempScale);
          state.mesh.setMatrixAt(i, tempMatrix);

          tempColor.setRGB(glowR, glowG, glowB);
          state.glowMesh.setColorAt(i, tempColor);
          tempScale.setScalar(state.visible[i] ? glowScale : hiddenGlowScale);
          tempMatrix.compose(state.positions[i], tempQuat, tempScale);
          state.glowMesh.setMatrixAt(i, tempMatrix);
        }

        state.mesh.instanceColor.needsUpdate = true;
        state.mesh.instanceMatrix.needsUpdate = true;
        state.glowMesh.instanceColor.needsUpdate = true;
        state.glowMesh.instanceMatrix.needsUpdate = true;
      }

      function processFrame(frame) {
        if (!frame || !Array.isArray(frame.neurons)) {
          return;
        }

        ui.tickValue.textContent = String(frame.tick || 0);
        ui.activeValue.textContent = String(frame.activeCount || frame.neurons.length || 0);

        const total = Number(frame.totalNeurons || state.lattice.neuronCount || 1);
        const ratio = total > 0 ? (100 * (frame.neurons.length / total)) : 0;
        ui.ratioValue.textContent = `${ratio.toFixed(2)}%`;

        for (const fired of frame.neurons) {
          const idx = state.idToIndex.get(fired.id);
          if (idx === undefined) {
            continue;
          }

          state.flash[idx] = 1.0;
          state.heat[idx] = Math.min(1.0, state.heat[idx] + 0.32);
        }
      }

      function drainQueueOne() {
        if (state.frameQueue.length === 0) {
          return;
        }
        const frame = state.frameQueue.shift();
        processFrame(frame);
      }

      async function loadTraceSnapshot() {
        const response = await fetch("/trace", { cache: "no-store" });
        if (!response.ok) {
          return null;
        }
        return response.json();
      }

      async function refreshTraceSnapshot(replaceQueue = false) {
        if (state.traceRefreshPending) {
          return false;
        }

        state.traceRefreshPending = true;
        try {
          const snapshot = await loadTraceSnapshot();
          if (!snapshot) {
            return false;
          }

          const nextVersion = typeof snapshot.version === "string" ? snapshot.version : "";
          const shouldReplace =
            replaceQueue || state.frameQueue.length === 0 || state.traceFrames.length === 0 || nextVersion !== state.traceVersion;
          return applyTraceSnapshot(snapshot, shouldReplace);
        } finally {
          state.traceRefreshPending = false;
        }
      }

      function ensureTracePolling() {
        if (state.tracePollHandle !== 0) {
          return;
        }

        state.tracePollHandle = window.setInterval(() => {
          if (state.connected && state.frameQueue.length > 0) {
            return;
          }

          refreshTraceSnapshot(state.frameQueue.length === 0).catch(() => {});
        }, 1500);
      }

      function animate(nowMs) {
        requestAnimationFrame(animate);

        if (!animate.lastMs) {
          animate.lastMs = nowMs;
        }

        const deltaSec = Math.max(0.001, (nowMs - animate.lastMs) / 1000);
        animate.lastMs = nowMs;

        if (!state.paused) {
          animate.queueBudget = (animate.queueBudget || 0) + (deltaSec * state.speed * 20.0);
          let steps = Math.floor(animate.queueBudget);
          if (steps > 0) {
            animate.queueBudget -= steps;
            if (state.frameQueue.length > 0) {
              steps = Math.min(steps, state.frameQueue.length);
              for (let i = 0; i < steps; i += 1) {
                processFrame(state.frameQueue.shift());
              }
            } else if (state.traceFrames.length > 0) {
              for (let i = 0; i < steps; i += 1) {
                processFrame(state.traceFrames[state.fallbackCursor]);
                state.fallbackCursor = (state.fallbackCursor + 1) % state.traceFrames.length;
              }
            }
          }
        }

        const flashDecay = Math.exp(-deltaSec * 4.2);
        const heatDecay = Math.exp(-deltaSec * 0.72);

        for (let i = 0; i < state.flash.length; i += 1) {
          state.flash[i] *= flashDecay;
          state.heat[i] *= heatDecay;
        }

        const bufferedFrames = state.frameQueue.length > 0 ? state.frameQueue.length : state.traceFrames.length;
        ui.queueValue.textContent = String(bufferedFrames);

        updateInstances();
        controls.update();
        renderer.render(scene, camera);
      }

      function installControls() {
        ui.togglePlay.addEventListener("click", () => {
          state.paused = !state.paused;
          ui.togglePlay.textContent = state.paused ? "Resume" : "Pause";
        });

        ui.stepTick.addEventListener("click", () => {
          state.paused = true;
          ui.togglePlay.textContent = "Resume";
          drainQueueOne();
        });

        ui.heatMode.addEventListener("click", () => {
          state.heatmap = !state.heatmap;
          ui.heatMode.textContent = state.heatmap ? "Heatmap: On" : "Heatmap: Off";
        });

        ui.clearQueue.addEventListener("click", () => {
          state.frameQueue = [];
        });

        ui.speed.addEventListener("input", () => {
          state.speed = Number(ui.speed.value);
          ui.speedValue.textContent = `${state.speed.toFixed(2)}x`;
        });

        ui.zSlice.addEventListener("input", () => {
          state.zSlice = Number(ui.zSlice.value);
          ui.zSliceValue.textContent = state.zSlice < 0 ? "All layers" : `Layer Z=${state.zSlice}`;
          updateVisibility();
        });

        const onFilterChange = () => updateVisibility();
        ui.showExcitatory.addEventListener("change", onFilterChange);
        ui.showInhibitory.addEventListener("change", onFilterChange);
        ui.showOutput.addEventListener("change", onFilterChange);
      }

      function initMesh(lattice) {
        state.lattice = lattice;

        const count = lattice.neurons.length;
        const geometry = new THREE.SphereGeometry(0.48, 7, 7);
        const material = new THREE.MeshStandardMaterial({
          roughness: 0.26,
          metalness: 0.06,
          vertexColors: true,
          transparent: true,
          opacity: 0.98,
        });
        const glowGeometry = new THREE.SphereGeometry(0.62, 8, 8);
        const glowMaterial = new THREE.MeshBasicMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 0.95,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });

        state.mesh = new THREE.InstancedMesh(geometry, material, count);
        state.mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        state.mesh.frustumCulled = false;
        state.glowMesh = new THREE.InstancedMesh(glowGeometry, glowMaterial, count);
        state.glowMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        state.glowMesh.frustumCulled = false;
        state.glowMesh.renderOrder = 2;
        scene.add(state.mesh);
        scene.add(state.glowMesh);

        state.positions = new Array(count);
        state.visible = new Array(count).fill(true);
        state.baseColors = new Array(count);
        state.flash = new Array(count).fill(0);
        state.heat = new Array(count).fill(0);

        for (let i = 0; i < count; i += 1) {
          const neuron = lattice.neurons[i];
          const position = toWorldPosition(neuron, lattice);
          state.positions[i] = position;
          state.idToIndex.set(neuron.id, i);

          const base = colorForType(neuron.type);
          state.baseColors[i] = base;

          tempScale.setScalar(0.155);
          tempMatrix.compose(position, tempQuat, tempScale);
          state.mesh.setMatrixAt(i, tempMatrix);

          tempColor.setRGB(base[0], base[1], base[2]);
          state.mesh.setColorAt(i, tempColor);
          tempColor.setRGB(0.0, 0.0, 0.0);
          state.glowMesh.setColorAt(i, tempColor);
          tempScale.setScalar(0.00001);
          tempMatrix.compose(position, tempQuat, tempScale);
          state.glowMesh.setMatrixAt(i, tempMatrix);
        }

        state.mesh.instanceMatrix.needsUpdate = true;
        state.mesh.instanceColor.needsUpdate = true;
        state.glowMesh.instanceMatrix.needsUpdate = true;
        state.glowMesh.instanceColor.needsUpdate = true;

        const gridSize = (Math.max(lattice.width, lattice.height) * 0.92) + 2.2;
        const grid = new THREE.GridHelper(
          gridSize,
          Math.max(4, Math.ceil(gridSize / 1.1)),
          0x69d8ff,
          0x17364d,
        );
        grid.position.y = -((lattice.depth - 1) * 0.46);
        scene.add(grid);

        const halfX = (((lattice.width - 1) * 0.82) / 2) + 0.72;
        const halfZ = (((lattice.height - 1) * 0.82) / 2) + 0.72;
        const halfY = (((lattice.depth - 1) * 0.92) / 2) + 0.52;
        const bounds = new THREE.LineSegments(
          new THREE.EdgesGeometry(
            new THREE.BoxGeometry(halfX * 2, halfY * 2, halfZ * 2),
          ),
          new THREE.LineBasicMaterial({
            color: 0x8ee5ff,
            transparent: true,
            opacity: 0.38,
          }),
        );
        scene.add(bounds);

        for (let layer = 0; layer < lattice.depth; layer += 1) {
          const layerY = (layer - ((lattice.depth - 1) / 2)) * 0.92;
          const layerLoop = new THREE.LineLoop(
            new THREE.BufferGeometry().setFromPoints([
              new THREE.Vector3(-halfX, layerY, -halfZ),
              new THREE.Vector3(halfX, layerY, -halfZ),
              new THREE.Vector3(halfX, layerY, halfZ),
              new THREE.Vector3(-halfX, layerY, halfZ),
            ]),
            new THREE.LineBasicMaterial({
              color: layer === lattice.depth - 1 ? 0xffc95d : 0x2c5d77,
              transparent: true,
              opacity: layer === lattice.depth - 1 || layer === 0 ? 0.34 : 0.14,
            }),
          );
          scene.add(layerLoop);
        }

        ui.zSlice.max = String(Math.max(0, lattice.depth - 1));
        ui.zSlice.value = "-1";
        ui.zSliceValue.textContent = "All layers";

        updateVisibility();
      }

      function connectWebSocket() {
        const socket = new WebSocket(wsUrl);
        setConnectionState(false);

        socket.addEventListener("open", () => {
          setConnectionState(true);
        });

        socket.addEventListener("message", (event) => {
          let payload;
          try {
            payload = JSON.parse(event.data);
          } catch (error) {
            return;
          }

          if (payload.type === "hello") {
            updateTraceMeta(payload);
            if (payload.traceReady === true) {
              refreshTraceSnapshot(state.frameQueue.length === 0).catch(() => {});
            }
            return;
          }

          if (payload.type === "trace_meta") {
            updateTraceMeta(payload);
            refreshTraceSnapshot(true)
              .catch(() => {
                state.frameQueue = [];
                state.traceFrames = [];
                state.traceVersion = "";
                state.fallbackCursor = 0;
                setConnectionState(state.connected);
              });
            return;
          }

          if (!payload || !Array.isArray(payload.neurons)) {
            return;
          }

          state.frameQueue.push(payload);
          if (state.frameQueue.length > 400) {
            state.frameQueue.shift();
          }
        });

        socket.addEventListener("close", () => {
          setConnectionState(false);
          refreshTraceSnapshot(state.frameQueue.length === 0).catch(() => {});
          window.setTimeout(connectWebSocket, 1500);
        });

        socket.addEventListener("error", () => {
          socket.close();
        });
      }

      async function loadLatticeWithRetry() {
        for (;;) {
          const response = await fetch("/lattice", { cache: "no-store" });
          if (response.ok) {
            return response.json();
          }

          if (response.status !== 503) {
            throw new Error(`Failed to load lattice: ${response.status}`);
          }

          setWaitingState("waiting");
          ui.queueValue.textContent = "trace pending";
          await new Promise((resolve) => window.setTimeout(resolve, 1500));
        }
      }

      async function bootstrap() {
        installControls();
        const lattice = await loadLatticeWithRetry();
        initMesh(lattice);
        ensureTracePolling();
        await refreshTraceSnapshot(true).catch(() => false);
        connectWebSocket();

        requestAnimationFrame(animate);
      }

      bootstrap().catch((error) => {
        ui.connState.textContent = "error";
        ui.connState.classList.remove("ok");
        ui.connState.classList.add("bad");
        ui.queueValue.textContent = "load failed";
        console.error(error);
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
