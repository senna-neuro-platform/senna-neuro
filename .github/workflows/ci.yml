name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tidy

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install conan ruff

      - name: Configure Conan profile
        run: |
          conan profile detect --force
          conan remote add conancenter https://center2.conan.io --force

      - name: Conan install (Debug)
        run: conan install . --output-folder=build/debug --build=missing -s build_type=Debug

      - name: Configure (Debug)
        run: cmake --preset debug

      - name: Build (Debug)
        run: cmake --build --preset debug

      - name: Test (Debug)
        run: ctest --preset debug

      - name: clang-tidy
        run: clang-tidy src/main.cpp -p build/debug

      - name: Ruff
        run: ruff check .

      - name: Conan install (Sanitize)
        if: github.event_name == 'pull_request'
        run: conan install . --output-folder=build/sanitize --build=missing -s build_type=Debug

      - name: Configure (Sanitize)
        if: github.event_name == 'pull_request'
        run: cmake --preset sanitize

      - name: Build (Sanitize)
        if: github.event_name == 'pull_request'
        run: cmake --build --preset sanitize

      - name: Test (Sanitize)
        if: github.event_name == 'pull_request'
        run: ctest --preset sanitize
