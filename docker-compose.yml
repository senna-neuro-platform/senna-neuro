services:
  simulator:
    build:
      context: ./infra/simulator
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - simulator

  grafana:
    image: grafana/grafana-oss:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  visualizer:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./visualizer:/app:ro
    command: ["node", "server.js"]
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin123; do
          echo "waiting for minio...";
          sleep 2;
        done
        mc mb --ignore-existing local/senna-artifacts
    restart: "no"

  artifact-uploader:
    build:
      context: ./infra/artifact-uploader
    env_file:
      - ./configs/storage/artifact_uploader.env
    volumes:
      - ./data/artifacts:/artifacts
    depends_on:
      - minio
      - minio-init
    restart: unless-stopped
