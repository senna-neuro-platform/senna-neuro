version: "3.9"

services:
  senna-core:
    build:
      context: .
      dockerfile: docker/core.Dockerfile
    ports:
      - "50051:50051"
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./data:/data
      - ./configs:/configs

  trainer:
    build:
      context: .
      dockerfile: docker/trainer.Dockerfile
    environment:
      SENNA_CORE_HOST: senna-core
      SENNA_CORE_PORT: "50051"
    depends_on:
      - senna-core
    volumes:
      - ./data:/data
      - ./configs:/configs

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - senna-core
    ports:
      - "9091:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./configs/grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboard-provider.yml:ro
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

  visualizer:
    build:
      context: .
      dockerfile: docker/visualizer.Dockerfile
    depends_on:
      - senna-core
    ports:
      - "8081:8081"
