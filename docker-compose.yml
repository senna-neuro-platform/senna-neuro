services:
  simulator:
    build:
      context: ./infra/simulator
    environment:
      METRICS_SNAPSHOT_PATH: /artifacts/metrics/latest.json
    volumes:
      - ./data/artifacts:/artifacts
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - simulator

  grafana:
    image: grafana/grafana-oss:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  visualizer:
    image: node:20-alpine
    working_dir: /app
    environment:
      VISUALIZER_TRACE_PATH: /artifacts/visualizer/latest.json
    volumes:
      - ./visualizer:/app:ro
      - ./data/artifacts:/artifacts:ro
    command: ["node", "server.js"]
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 minioadmin minioadmin123
        until mc ready local; do
          echo "waiting for minio cluster readiness...";
          sleep 2;
        done
        until mc mb --ignore-existing local/senna-artifacts; do
          echo "waiting to create bucket...";
          sleep 2;
        done
    restart: "no"

  artifact-uploader:
    build:
      context: ./infra/artifact-uploader
    env_file:
      - ./configs/storage/artifact_uploader.env
    volumes:
      - ./data/artifacts:/artifacts
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
